<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moët & Chandon × Pharrell Williams — A Shared Art of Celebration</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,30..70,0..1;1,9..144,300..700,30..70,0..1&family=Manrope:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bone:       #d6e4ee;   /* pale powder blue backdrop */
        --ink:        #0e0c0a;
        --ink-soft:   rgba(14,12,10,0.62);
        --ink-mute:   rgba(14,12,10,0.40);
        --rule:       rgba(14,12,10,0.14);
        --paper:      #ffffff;
        --gold:       #b8965a;
        --red:        #c00016;
        --font-sans:  "Manrope", system-ui, sans-serif;
        --font-disp:  "Fraunces", "Cormorant Garamond", Georgia, serif;
        --ease:       cubic-bezier(0.2, 0.7, 0.1, 1);
      }

      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root {
        margin: 0; padding: 0; height: 100%;
        background: var(--bone);
        color: var(--ink);
        font-family: var(--font-sans);
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      /* Ice Impérial inspired pale-blue stage */
      .stage {
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background:
          radial-gradient(ellipse 78% 60% at 50% 50%,
            #e7f0f6 0%, #c8d9e6 50%, #a4becf 100%);
      }

      /* ===== White top nav bar (like the reference) ===== */
      .topbar {
        position: fixed; top: 16px; left: 16px; right: 16px;
        z-index: 30;
        display: grid; grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 18px 32px;
        background: var(--paper);
        box-shadow: 0 1px 0 rgba(14,12,10,0.04), 0 12px 30px -18px rgba(14,12,10,0.18);
      }
      .nav-left {
        display: flex; align-items: center; gap: 36px;
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.22em; text-transform: uppercase;
        color: var(--ink);
      }
      .nav-right {
        justify-self: end;
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.22em; text-transform: uppercase;
        color: var(--ink);
      }
      .nav-link {
        color: inherit; text-decoration: none;
        position: relative; padding-bottom: 3px;
        transition: color 240ms var(--ease);
      }
      .nav-link::after {
        content: ""; position: absolute; left: 0; right: 100%; bottom: 0;
        height: 1px; background: var(--ink);
        transition: right 380ms var(--ease);
      }
      .nav-link:hover::after { right: 0; }

      .wordmark {
        text-align: center; line-height: 1;
        font-family: var(--font-disp);
        font-weight: 500; font-style: italic;
        font-variation-settings: "opsz" 96, "SOFT" 50, "WONK" 0;
        font-size: 18px; letter-spacing: 0.04em;
        color: var(--ink);
        white-space: nowrap;
      }
      .wordmark .amp {
        margin: 0 4px; font-weight: 400; font-style: normal;
      }

      /* ===== Minimal corner scroll cue ===== */
      .scroll-cue {
        position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
        z-index: 27;
        display: flex; flex-direction: column; align-items: center; gap: 10px;
        font-family: var(--font-sans);
        font-size: 9.5px; font-weight: 700;
        letter-spacing: 0.42em; text-transform: uppercase;
        color: var(--ink-mute);
        pointer-events: none;
      }
      .scroll-cue .stem {
        width: 1px; height: 36px;
        background: linear-gradient(to bottom, var(--ink) 0%, transparent 100%);
        position: relative; overflow: hidden;
      }
      .scroll-cue .stem::after {
        content: ""; position: absolute; left: 0; right: 0; top: 0; height: 14px;
        background: var(--ink);
        animation: cue 2.2s var(--ease) infinite;
      }
      @keyframes cue {
        0%   { transform: translateY(-100%); opacity: 0; }
        40%  { opacity: 1; }
        100% { transform: translateY(280%); opacity: 0; }
      }

      /* ===== Pill CTA button — matches reference "Explore the Collection" ===== */
      .btn-pill {
        display: inline-flex; align-items: center; gap: 12px;
        padding: 13px 22px 13px 24px;
        background: rgba(255,255,255,0.92);
        border: 1px solid rgba(14,12,10,0.10);
        border-radius: 999px;
        color: var(--ink);
        font-family: var(--font-sans);
        font-size: 10px; font-weight: 700;
        letter-spacing: 0.32em; text-transform: uppercase;
        text-decoration: none; cursor: pointer;
        backdrop-filter: blur(6px);
        transition: background 240ms var(--ease), color 240ms var(--ease), transform 240ms var(--ease);
      }
      .btn-pill:hover { background: var(--ink); color: var(--paper); transform: translateY(-1px); }
      .btn-pill .arrow {
        display: inline-flex; width: 20px; height: 20px;
        align-items: center; justify-content: center;
        background: var(--ink); color: var(--paper);
        border-radius: 999px;
        font-size: 10px; line-height: 1;
        transition: background 240ms var(--ease), color 240ms var(--ease);
      }
      .btn-pill:hover .arrow { background: var(--paper); color: var(--ink); }

      .btn-pill.on-dark { background: rgba(14,12,10,0.55); color: #fff;
        border-color: rgba(255,255,255,0.45); }
      .btn-pill.on-dark .arrow { background: #fff; color: var(--ink); }
      .btn-pill.on-dark:hover { background: #fff; color: var(--ink); }
      .btn-pill.on-dark:hover .arrow { background: var(--ink); color: #fff; }

      /* ===== Page-load reveal ===== */
      .reveal { opacity: 0; transform: translateY(6px); animation: rise 780ms var(--ease) forwards; }
      .reveal.d1 { animation-delay: 60ms; }
      .reveal.d2 { animation-delay: 180ms; }
      .reveal.d3 { animation-delay: 320ms; }
      @keyframes rise {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 720px) {
        .topbar { grid-template-columns: 1fr; gap: 14px; padding: 14px 20px; }
        .nav-left { justify-self: center; gap: 18px; font-size: 10px; }
        .nav-right { justify-self: center; }
        .wordmark { font-size: 16px; }
      }
    </style>
  </head>
  <body>
    <div class="stage"></div>

    <div id="root"></div>

    <header class="topbar reveal d1">
      <nav class="nav-left">
        <a class="nav-link" href="#">Our Champagnes</a>
        <a class="nav-link" href="#">Experiences</a>
        <a class="nav-link" href="#">Moët Rituals</a>
        <a class="nav-link" href="#">Maison</a>
      </nav>
      <div class="wordmark">Moët <span class="amp">&amp;</span> Chandon</div>
      <nav class="nav-right">
        <a class="nav-link" href="#">Find Us</a>
      </nav>
    </header>

    <div class="scroll-cue reveal d3">
      <span>Scroll</span>
      <span class="stem"></span>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
